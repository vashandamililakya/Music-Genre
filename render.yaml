services:
  - type: web
    name: music-genre-classifier
    runtime: python
    buildCommand: pip install -r requirements.txt && python model/train.py --demo
    startCommand: gunicorn "main:application" --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_DEBUG
        value: false
      - key: PORT
        value: 10000
